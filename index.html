<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <div class="main">
        <div class="logincontainer">
            <div class="logincontent">
                 <div class="left">
                <h1 id="heading">Welcome Back.........</h1>
                <div class="inputdiv">

                    <div class="firstdiv" id="backgroundmail">
                        <i class="ri-mail-fill"></i>
                        <input id="email" type="text" placeholder="Email">
                    </div>
                    <div class="firstdiv" id="backgroundpass">
                        <i class="ri-lock-line"></i>
                        <input id="password" type="text" placeholder="Password ">

                    </div>
                      <div class="firstdiv confirmpass" id="confirmpassbg">
                        <i class="ri-lock-line"></i>
                        <input id="confirmpassword" type="text" placeholder="Confirm Password ">

                    </div>
                </div>
                <h3 id="h3">Forget Password</h3>

                <button id="button">Login <i class="ri-send-plane-2-fill"></i></button>
                <h4 id="h4">Don't have an account? <span id="signup">Sign Up</span></h4>
            </div>
            <div class="right">
                <div class="imgcontainer">
                    <img src="https://i.pinimg.com/736x/03/7b/21/037b217a15cac4a8ca34a197dc3e69ef.jpg" alt="">
                </div>
            </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
        integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="script.js"></script>
</body>

</html>
